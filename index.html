<!DOCTYPE html>
<html>
<head>
    <title>My API Project</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background-color: #f4f4f9; }
        img { max-width: 450px; border: 5px solid white; border-radius: 15px; margin-top: 20px; display: block; margin-inline: auto; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; background: #2ea44f; color: white; border: none; border-radius: 6px; transition: background 0.3s; }
        button:hover { background: #2c974b; }
        #errorMsg { color: #d93025; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Daily Dog Dose</h1>
    <p>Click the button to fetch a random dog from the <strong>Dog CEO API</strong>!</p>
    
    <button id="dogBtn">Get New Dog</button>
    
    <div id="dogContainer"></div>
    <div id="errorMsg"></div>

    <script>
        const btn = document.getElementById('dogBtn');
        const container = document.getElementById('dogContainer');
        const errorDiv = document.getElementById('errorMsg');

        btn.addEventListener('click', () => {
            // Clear previous results/errors
            errorDiv.innerHTML = "";
            
            // WE USE THE SPECIFIC DATA ENDPOINT HERE
            fetch('https://dog.ceo/api/breeds/image/random')
                .then(response => {
                    if (!response.ok) throw new Error('API could not be reached');
                    return response.json(); 
                })
                .then(data => {
                    // The API sends back an object. We want the 'message' which is the image URL.
                    container.innerHTML = `<img src="${data.message}" alt="Random Dog">`;
                })
                .catch(err => {
                    console.error('Fetch error:', err);
                    errorDiv.innerHTML = "Oops! Something went wrong. Check your internet or the URL.";
                });
        });
    </script>

</body>
</html>
