  <!DOCTYPE html>
<html>
<head>
    <title>My API Project</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; }
        img { max-width: 400px; border-radius: 10px; margin-top: 20px; display: block; margin-inline: auto; }
        button { padding: 10px 20px; cursor: pointer; background: #2ea44f; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>

    <h1>Daily Dog Dose</h1>
    <button id="dogBtn">Get New Dog</button>
    <div id="dogContainer"></div>
    
<!-- 1. Use this IF you have a separate file named script.js 
<script src="script.js"></script>-->
    
    <script>
        // This part tells the button what to do
        const btn = document.getElementById('dogBtn');
        const container = document.getElementById('dogContainer');

        btn.addEventListener('click', () => {
            // We call the Dog API
            fetch('https://dog.ceo')
                .then(response => response.json())
                .then(data => {
                    // This puts the dog image inside the 'dogContainer' div
                    container.innerHTML = `<img src="${data.message}" alt="Cute Dog">`;
                })
                .catch(error => console.log('Error:', error));
        });
    </script>

</body>
</html>
