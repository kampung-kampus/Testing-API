<!DOCTYPE html>
<html>
<head>
    <title>My API Project</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; }
        img { max-width: 400px; border-radius: 10px; margin-top: 20px; display: block; margin-inline: auto; }
        button { padding: 10px 20px; cursor: pointer; background: #2ea44f; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>

    <h1>Daily Dog Dose</h1>
    <button id="dogBtn">Get New Dog</button>
    <div id="dogContainer"></div>

  <!-- 1. Use this IF you have a separate file named script.js -->
<script src="script.js"></script>

<!-- 2. Use a NEW tag for your LTA "inline" code -->
<script>
  fetch('http://datamall2.mytransport.sg', {
    method: 'GET',
    headers: {
      'AccountKey': 'YOUR_LTA_KEY_HERE', // Replace with your real key
      'accept': 'application/json'
    }
  })
  .then(response => response.json())
  .then(data => {
      console.log("LTA Data Received:", data);
      // This is where you would write code to show the data on your page
  })
  .catch(err => console.error("LTA Error:", err));
</script>

</body>
</html>
